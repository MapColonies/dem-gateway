openapi: 3.1.0
security: []
info:
  title: dem-gateway
  description: Gateway for DEM resources manipulation
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: dem
    description: APIs for initiating DEM resource operations
  - name: validate
    description: APIs for validation of DEM input
paths:
  /dem:
    post:
      operationId: create
      tags:
        - dem
      summary: Create a DEM resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestBody'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemSuccessfulResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        422:
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /dem/{id}:
    patch:
      operationId: edit
      tags:
        - dem
      summary: Edit an existing DEM resource
      parameters:
        - name: id
          in: path
          description: The id of the DEM to edit
          required: true
          schema:
            $ref: '#/components/schemas/LayerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditRequestBody'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemSuccessfulResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        422:
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      operationId: delete
      tags:
        - dem
      summary: Delete an existing DEM resource
      parameters:
        - name: id
          in: path
          description: The id of the DEM to delete
          required: true
          schema:
            $ref: '#/components/schemas/LayerId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemSuccessfulResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        422:
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /dem/{id}/status:
    patch:
      operationId: editStatus
      tags:
        - dem
      summary: Edit status for existing DEM resource
      parameters:
        - name: id
          in: path
          description: The id of the DEM whose status to edit
          required: true
          schema:
            $ref: '#/components/schemas/LayerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditStatusRequestBody'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemSuccessfulResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        422:
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /validate:
    post:
      operationId: validate
      tags:
        - validate
      summary: Checks validation for provided DEM file
      requestBody:
        description: An object containing object of DEM input file
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequestBody'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
components:
  schemas:
    Classification:
      type: string
      description: Permitted roles, value must be between 0 and 100
      pattern: ^[0-9]$|^[1-9][0-9]$|^(100)$
    CreateRequestBody:
      type: object
      unevaluatedProperties: false
      required:
        - metadata
        - inputFiles
      properties:
        metadata:
          $ref: '#/components/schemas/DemMetadata'
        inputFiles:
          $ref: '#/components/schemas/InputFiles'
    DemFilePath:
      type: string
      pattern: ^(\/?[\w-]+)(\/[\w-]+)*\/[\wא-ת\.-]+\.(tif)$
      description: Input file paths
      example: /path/to/example.tif
    DemMetadata:
      type: object
      unevaluatedProperties: false
      required:
        - classification
        - productId
        - productName
        - productType
        - region
      properties:
        classification:
          $ref: '#/components/schemas/Classification'
        productId:
          $ref: '#/components/schemas/ProductId'
        productName:
          $ref: '#/components/schemas/ProductName'
        productType:
          $ref: '#/components/schemas/ProductType'
        region:
          $ref: '#/components/schemas/Region'
        description:
          $ref: '#/components/schemas/Description'
        geoidModel:
          $ref: '#/components/schemas/GeoidModel'
        keywords:
          $ref: '#/components/schemas/Keywords'
        producerName:
          $ref: '#/components/schemas/ProducerName'
        productSubType:
          $ref: '#/components/schemas/ProductSubType'
    DemSuccessfulResponse:
      type: object
      unevaluatedProperties: false
      required:
        - jobId
      properties:
        jobId:
          type: string
          format: uuid
    Description:
      type: string
      description: Layer's description
      minLength: 1
    ErrorMessage:
      type: object
      unevaluatedProperties: false
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
    GeoidModel:
      type: string
      description: Earth's geoid model
      minLength: 1
    InputFiles:
      type: object
      unevaluatedProperties: false
      required:
        - demFilePath
        - metadataShapefilePath
        - productShapefilePath
      properties:
        demFilePath:
          $ref: '#/components/schemas/DemFilePath'
        metadataShapefilePath:
          $ref: '#/components/schemas/MetadataShapefilePath'
        productShapefilePath:
          $ref: '#/components/schemas/ProductShapefilePath'
    Keywords:
      type: string
      minLength: 1
    LayerId:
      type: string
      format: uuid
      description: Layer's identifier
      example: c52d8189-7e07-456a-8c6b-53859523c3e9
    MetadataShapefilePath:
      type: string
      pattern: ^(\/?[\w-]+)(\/[\w-]+)*\/ShapeMetadata\.shp$
      description: Metadata shape file path
      example: /path/to/ShapeMetadata.shp
    Status:
      type: string
      default: UNPUBLISHED
      enum:
        - PUBLISHED
        - UNPUBLISHED
        - BEING_DELETED
      description: The status of the DEM
    EditRequestBody:
      type: object
      unevaluatedProperties: false
      properties:
        classification:
          $ref: '#/components/schemas/Classification'
        description:
          $ref: '#/components/schemas/Description'
        geoidModel:
          $ref: '#/components/schemas/GeoidModel'
        keywords:
          $ref: '#/components/schemas/Keywords'
        producerName:
          $ref: '#/components/schemas/ProducerName'
        productName:
          $ref: '#/components/schemas/ProductName'
        region:
          $ref: '#/components/schemas/Region'
    EditStatusRequestBody:
      type: object
      unevaluatedProperties: false
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/Status'
    ProducerName:
      type: string
      default: IDFMU
      description: Layer's producer name default to 'IDFMU'
      minLength: 1
    ProductId:
      type: string
      pattern: ^[A-Za-z]{1}[A-Za-z0-9_]{0,34}$
      description: Layer's external identifier, must start with a letter and contain only letters, numbers and underscores
      example: SRTM
    ProductName:
      type: string
      description: Layer's external name
      minLength: 1
    ProductSubType:
      type: string
      description: Layer's sub type
      minLength: 1
    ProductType:
      type: string
      enum:
        - DTM
        - DSM
      description: Layer's type, list of DEM product types
    ProductShapefilePath:
      type: string
      pattern: ^(\/?[\w-]+)(\/[\w-]+)*\/Product\.shp$
      description: Product shape file path
      example: /path/to/Product.shp
    Region:
      type: array
      items:
        type: string
        minLength: 1
      minItems: 1
      description: List of layer's regions
    ValidateBaseResponse:
      type: object
      properties:
        isValid:
          type: boolean
      required:
        - isValid
    ValidateFailedResponse:
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/ValidateBaseResponse'
        - type: object
          properties:
            isValid:
              type: boolean
              enum:
                - false
            errors:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  error:
                    type: string
                    minLength: 1
                    example: File is invalid
                required:
                  - error
          required:
            - errors
    ValidateResponse:
      oneOf:
        - $ref: '#/components/schemas/ValidateFailedResponse'
        - $ref: '#/components/schemas/ValidateSuccessfulResponse'
    ValidateRequestBody:
      type: object
      unevaluatedProperties: false
      required:
        - demFilePath
      properties:
        demFilePath:
          $ref: '#/components/schemas/DemFilePath'
    ValidateSuccessfulResponse:
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/ValidateBaseResponse'
        - type: object
          properties:
            isValid:
              type: boolean
              enum:
                - true
